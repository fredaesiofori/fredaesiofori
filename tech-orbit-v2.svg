<svg width="780" height="480" viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d17"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="780" height="480" fill="url(#bgGlow)" rx="18"/>

  <circle cx="390" cy="240" r="82" fill="url(#coreGlow)">
    <animate attributeName="r" values="72;90;72" dur="4s" repeatCount="indefinite"/>
  </circle>

  <text x="390" y="232" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="700" fill="#ffffff" filter="url(#softGlow)">FREDA OFORI</text>
  <text x="390" y="255" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="11.5" letter-spacing="1.5" fill="#C4B5FD">CLOUD &#38; AI-DRIVEN ENGINEER</text>

  <circle cx="390" cy="240" r="185" fill="none" stroke="#2e2e45" stroke-width="1"/>
  <circle cx="390" cy="240" r="118" fill="none" stroke="#2e2e45" stroke-width="1"/>

  <!-- Outer ring: Cloud & DevOps, real logos, clockwise -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 390 240" to="360 390 240" dur="28s" repeatCount="indefinite"/>

    <g transform="translate(575,240)">
      <circle r="27" fill="#12121f" stroke="#FF9900" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/amazonwebservices/FF9900" x="-13" y="-13" width="26" height="26"/>
      <text y="42" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="10" font-weight="700" fill="#FF9900">AWS</text>
    </g>
    <g transform="translate(529,378)">
      <circle r="27" fill="#12121f" stroke="#2496ED" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/docker/2496ED" x="-13" y="-13" width="26" height="26"/>
      <text y="42" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="10" font-weight="700" fill="#2496ED">Docker</text>
    </g>
    <g transform="translate(408,432)">
      <circle r="27" fill="#12121f" stroke="#844FBA" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/terraform/844FBA" x="-13" y="-13" width="26" height="26"/>
      <text y="42" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="10" font-weight="700" fill="#844FBA">Terraform</text>
    </g>
    <g transform="translate(263,392)">
      <circle r="27" fill="#12121f" stroke="#326CE5" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/kubernetes/326CE5" x="-13" y="-13" width="26" height="26"/>
      <text y="42" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="10" font-weight="700" fill="#326CE5">Kubernetes</text>
    </g>
    <g transform="translate(205,240)">
      <circle r="27" fill="#12121f" stroke="#2088FF" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/githubactions/2088FF" x="-13" y="-13" width="26" height="26"/>
      <text y="42" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="9.5" font-weight="700" fill="#2088FF">GH Actions</text>
    </g>
    <g transform="translate(263,88)">
      <circle r="27" fill="#12121f" stroke="#F46800" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/grafana/F46800" x="-13" y="-13" width="26" height="26"/>
      <text y="42" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="10" font-weight="700" fill="#F46800">Grafana</text>
    </g>
    <g transform="translate(408,48)">
      <circle r="27" fill="#12121f" stroke="#FCC624" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/linux/FCC624" x="-13" y="-13" width="26" height="26"/>
      <text y="42" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="10" font-weight="700" fill="#FCC624">Linux</text>
    </g>
  </g>

  <!-- Inner ring: Backend / Web / AI, real logos, counter-clockwise -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 390 240" to="0 390 240" dur="17s" repeatCount="indefinite"/>

    <g transform="translate(500,240)">
      <circle r="23" fill="#12121f" stroke="#FFCA28" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/firebase/FFCA28" x="-11" y="-11" width="22" height="22"/>
      <text y="36" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="9" font-weight="700" fill="#FFCA28">Firebase</text>
    </g>
    <g transform="translate(445,335)">
      <circle r="23" fill="#12121f" stroke="#339933" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/nodedotjs/339933" x="-11" y="-11" width="22" height="22"/>
      <text y="36" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="9" font-weight="700" fill="#339933">Node.js</text>
    </g>
    <g transform="translate(335,335)">
      <circle r="23" fill="#12121f" stroke="#61DAFB" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/react/61DAFB" x="-11" y="-11" width="22" height="22"/>
      <text y="36" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="9" font-weight="700" fill="#61DAFB">React</text>
    </g>
    <g transform="translate(280,240)">
      <circle r="23" fill="#12121f" stroke="#646CFF" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/vite/646CFF" x="-11" y="-11" width="22" height="22"/>
      <text y="36" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="9" font-weight="700" fill="#646CFF">Vite</text>
    </g>
    <g transform="translate(335,145)">
      <circle r="23" fill="#12121f" stroke="#D97757" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/claude/D97757" x="-11" y="-11" width="22" height="22"/>
      <text y="36" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="9" font-weight="700" fill="#D97757">Claude</text>
    </g>
    <g transform="translate(445,145)">
      <circle r="23" fill="#12121f" stroke="#74AA9C" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/openai/74AA9C" x="-11" y="-11" width="22" height="22"/>
      <text y="36" text-anchor="middle" font-family="Segoe UI, Verdana" font-size="9" font-weight="700" fill="#74AA9C">ChatGPT</text>
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 390 240" to="360 390 240" dur="10s" repeatCount="indefinite"/>
    <circle cx="490" cy="240" r="4" fill="#F9A8D4"/>
    <circle cx="390" cy="340" r="4" fill="#C4B5FD"/>
    <circle cx="290" cy="240" r="4" fill="#F9A8D4"/>
    <circle cx="390" cy="140" r="4" fill="#C4B5FD"/>
  </g>
</svg>
