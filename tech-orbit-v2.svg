<svg width="760" height="460" viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d17"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="760" height="460" fill="url(#bgGlow)" rx="18"/>

  <!-- center glow -->
  <circle cx="380" cy="230" r="80" fill="url(#coreGlow)">
    <animate attributeName="r" values="70;88;70" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- center name -->
  <text x="380" y="222" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="700" fill="#ffffff" filter="url(#softGlow)">FREDA OFORI</text>
  <text x="380" y="245" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="11.5" letter-spacing="1.5" fill="#C4B5FD">CLOUD &#38; AI-DRIVEN ENGINEER</text>

  <!-- orbit rings (visual only) -->
  <circle cx="380" cy="230" r="180" fill="none" stroke="#2e2e45" stroke-width="1"/>
  <circle cx="380" cy="230" r="115" fill="none" stroke="#2e2e45" stroke-width="1"/>

  <!-- Outer ring : Cloud / DevOps, 7 icons, clockwise -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 380 230" to="360 380 230" dur="26s" repeatCount="indefinite"/>

    <g transform="translate(560,230)">
      <circle r="25" fill="#232F3E" stroke="#FF9900" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="10" font-weight="700" fill="#FF9900">AWS</text>
    </g>
    <g transform="translate(517,362)">
      <circle r="25" fill="#0b1220" stroke="#2496ED" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="8.5" font-weight="700" fill="#2496ED">DOCKER</text>
    </g>
    <g transform="translate(400,415)">
      <circle r="25" fill="#0b1220" stroke="#844FBA" stroke-width="2"/>
      <text text-anchor="middle" dy="3" font-family="Segoe UI, Verdana" font-size="7.5" font-weight="700" fill="#844FBA">TERRA-<tspan x="0" dy="9">FORM</tspan></text>
    </g>
    <g transform="translate(258,378)">
      <circle r="25" fill="#0b1220" stroke="#326CE5" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="8" font-weight="700" fill="#326CE5">K8S</text>
    </g>
    <g transform="translate(200,230)">
      <circle r="25" fill="#0b1220" stroke="#2088FF" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="7" font-weight="700" fill="#2088FF">ACTIONS</text>
    </g>
    <g transform="translate(258,82)">
      <circle r="25" fill="#0b1220" stroke="#F46800" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="7.5" font-weight="700" fill="#F46800">GRAFANA</text>
    </g>
    <g transform="translate(400,45)">
      <circle r="25" fill="#0b1220" stroke="#FCC624" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="8.5" font-weight="700" fill="#FCC624">LINUX</text>
    </g>
  </g>

  <!-- Inner ring : Backend / Web / AI, 6 icons, counter-clockwise, faster -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 380 230" to="0 380 230" dur="16s" repeatCount="indefinite"/>

    <g transform="translate(495,230)">
      <circle r="21" fill="#1a1a2e" stroke="#FFCA28" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="6.8" font-weight="700" fill="#FFCA28">FIREBASE</text>
    </g>
    <g transform="translate(437,331)">
      <circle r="21" fill="#1a1a2e" stroke="#339933" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="6.8" font-weight="700" fill="#339933">NODE.JS</text>
    </g>
    <g transform="translate(322,331)">
      <circle r="21" fill="#1a1a2e" stroke="#61DAFB" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="7.5" font-weight="700" fill="#61DAFB">REACT</text>
    </g>
    <g transform="translate(265,230)">
      <circle r="21" fill="#1a1a2e" stroke="#646CFF" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="8" font-weight="700" fill="#646CFF">VITE</text>
    </g>
    <g transform="translate(322,129)">
      <circle r="21" fill="#1a1a2e" stroke="#D97757" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="6.8" font-weight="700" fill="#D97757">CLAUDE</text>
    </g>
    <g transform="translate(437,129)">
      <circle r="21" fill="#1a1a2e" stroke="#74AA9C" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="6.3" font-weight="700" fill="#74AA9C">CHATGPT</text>
    </g>
  </g>

  <!-- accent dots, subtle third layer -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 380 230" to="360 380 230" dur="9s" repeatCount="indefinite"/>
    <circle cx="480" cy="230" r="4" fill="#F9A8D4"/>
    <circle cx="380" cy="330" r="4" fill="#C4B5FD"/>
    <circle cx="280" cy="230" r="4" fill="#F9A8D4"/>
    <circle cx="380" cy="130" r="4" fill="#C4B5FD"/>
  </g>
</svg>
