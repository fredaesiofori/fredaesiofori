<svg width="700" height="420" viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d17"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="700" height="420" fill="url(#bgGlow)" rx="18"/>

  <!-- center glow -->
  <circle cx="350" cy="210" r="90" fill="url(#coreGlow)">
    <animate attributeName="r" values="80;100;80" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- center name -->
  <text x="350" y="205" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="26" font-weight="700" fill="#ffffff" filter="url(#softGlow)">FREDA OFORI</text>
  <text x="350" y="230" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="13" letter-spacing="2" fill="#C4B5FD">CLOUD &#38; DEVOPS ENGINEER</text>

  <!-- orbit rings (visual only) -->
  <circle cx="350" cy="210" r="150" fill="none" stroke="#2e2e45" stroke-width="1"/>
  <circle cx="350" cy="210" r="110" fill="none" stroke="#2e2e45" stroke-width="1"/>

  <!-- Orbit group 1 : outer ring, 7 icons -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 350 210" to="360 350 210" dur="22s" repeatCount="indefinite"/>

    <!-- AWS -->
    <g transform="translate(500,210)">
      <circle r="26" fill="#232F3E" stroke="#FF9900" stroke-width="2"/>
      <text text-anchor="middle" dy="5" font-family="Segoe UI, Verdana" font-size="11" font-weight="700" fill="#FF9900">AWS</text>
    </g>

    <!-- Docker -->
    <g transform="translate(455,340)">
      <circle r="26" fill="#0b1220" stroke="#2496ED" stroke-width="2"/>
      <text text-anchor="middle" dy="5" font-family="Segoe UI, Verdana" font-size="9.5" font-weight="700" fill="#2496ED">DOCKER</text>
    </g>

    <!-- Terraform -->
    <g transform="translate(315,355)">
      <circle r="26" fill="#0b1220" stroke="#844FBA" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="8.5" font-weight="700" fill="#844FBA">TERRA-<tspan x="0" dy="10">FORM</tspan></text>
    </g>

    <!-- Kubernetes -->
    <g transform="translate(200,270)">
      <circle r="26" fill="#0b1220" stroke="#326CE5" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="8" font-weight="700" fill="#326CE5">K8S</text>
    </g>

    <!-- GitHub Actions -->
    <g transform="translate(200,150)">
      <circle r="26" fill="#0b1220" stroke="#2088FF" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="7.5" font-weight="700" fill="#2088FF">ACTIONS</text>
    </g>

    <!-- Grafana -->
    <g transform="translate(315,65)">
      <circle r="26" fill="#0b1220" stroke="#F46800" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="8" font-weight="700" fill="#F46800">GRAFANA</text>
    </g>

    <!-- Linux -->
    <g transform="translate(455,80)">
      <circle r="26" fill="#0b1220" stroke="#FCC624" stroke-width="2"/>
      <text text-anchor="middle" dy="4" font-family="Segoe UI, Verdana" font-size="9" font-weight="700" fill="#FCC624">LINUX</text>
    </g>
  </g>

  <!-- Orbit group 2 : inner ring, counter-rotating, small accent dots -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 350 210" to="0 350 210" dur="14s" repeatCount="indefinite"/>
    <circle cx="460" cy="210" r="5" fill="#F9A8D4"/>
    <circle cx="350" cy="320" r="5" fill="#C4B5FD"/>
    <circle cx="240" cy="210" r="5" fill="#F9A8D4"/>
    <circle cx="350" cy="100" r="5" fill="#C4B5FD"/>
  </g>
</svg>
