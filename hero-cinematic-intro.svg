<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <radialGradient id="portGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="whalePath" d="M -120 220 C 150 190, 300 225, 460 205" fill="none"/>
    <path id="awsPath" d="M 950 60 C 780 70, 700 100, 640 120" fill="none"/>
    <path id="dockPath2" d="M 950 260 C 800 250, 720 210, 660 180" fill="none"/>
    <path id="k8sPath" d="M 450 -60 C 460 20, 500 70, 560 95" fill="none"/>
    <path id="tfPath" d="M -80 40 C 120 20, 300 45, 470 90" fill="none"/>
    <path id="claudePath" d="M 950 320 C 820 300, 760 260, 700 235" fill="none"/>
    <path id="gptPath" d="M -60 320 C 150 300, 350 280, 480 235" fill="none"/>
  </defs>

  <rect width="900" height="320" rx="20" fill="url(#bg)"/>
  <circle cx="450" cy="170" r="140" fill="url(#portGlow)">
    <animate attributeName="r" values="120;150;120" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- connecting lines, drawn in after each node arrives -->
  <g stroke="#93C5FD" stroke-width="1.4" fill="none" opacity="0">
    <line x1="450" y1="170" x2="600" y2="120" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" begin="4.6s" dur="0.8s" fill="freeze"/>
    </line>
    <line x1="450" y1="170" x2="640" y2="180" stroke-dasharray="220" stroke-dashoffset="220">
      <animate attributeName="stroke-dashoffset" from="220" to="0" begin="5.4s" dur="0.8s" fill="freeze"/>
    </line>
    <line x1="450" y1="170" x2="560" y2="95" stroke-dasharray="180" stroke-dashoffset="180">
      <animate attributeName="stroke-dashoffset" from="180" to="0" begin="6.2s" dur="0.8s" fill="freeze"/>
    </line>
    <line x1="450" y1="170" x2="470" y2="90" stroke-dasharray="150" stroke-dashoffset="150">
      <animate attributeName="stroke-dashoffset" from="150" to="0" begin="7.0s" dur="0.8s" fill="freeze"/>
    </line>
    <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.1s" fill="freeze"/>
  </g>

  <!-- Docker whale sails in first, carrying the intro -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.3s" fill="freeze"/>
    <g>
      <animateMotion begin="0.2s" dur="2.4s" fill="freeze">
        <mpath href="#whalePath"/>
      </animateMotion>
      <image href="https://cdn.simpleicons.org/docker/2496ED" x="-24" y="-24" width="48" height="48" filter="url(#glow)"/>
    </g>
  </g>

  <!-- container "delivers" the name text, pops open on arrival -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.4s" fill="freeze"/>
    <text x="460" y="150" text-anchor="start" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#93C5FD">&gt; docker run --name</text>
    <text x="460" y="178" text-anchor="start" font-family="Segoe UI, Verdana, sans-serif" font-size="34" font-weight="800" fill="#ffffff" filter="url(#glow)">Freda Ofori</text>
    <text x="460" y="204" text-anchor="start" font-family="Segoe UI, Verdana, sans-serif" font-size="14" letter-spacing="1.5" fill="#C4B5FD">CLOUD · DEVOPS · INFRASTRUCTURE AUTOMATION</text>
  </g>

  <!-- AWS flies in from the right -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
    <g>
      <animateMotion begin="3.4s" dur="1.2s" fill="freeze">
        <mpath href="#awsPath"/>
      </animateMotion>
      <circle r="24" fill="#0b1220" stroke="#FF9900" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/amazonwebservices/FF9900" x="-12" y="-12" width="24" height="24"/>
    </g>
  </g>

  <!-- Terraform flies in from lower-right -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.3s" fill="freeze"/>
    <g>
      <animateMotion begin="4.2s" dur="1.2s" fill="freeze">
        <mpath href="#dockPath2"/>
      </animateMotion>
      <circle r="24" fill="#0b1220" stroke="#844FBA" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/terraform/844FBA" x="-12" y="-12" width="24" height="24"/>
    </g>
  </g>

  <!-- Kubernetes drops in from the top -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.3s" fill="freeze"/>
    <g>
      <animateMotion begin="5.0s" dur="1.2s" fill="freeze">
        <mpath href="#k8sPath"/>
      </animateMotion>
      <circle r="24" fill="#0b1220" stroke="#326CE5" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/kubernetes/326CE5" x="-12" y="-12" width="24" height="24"/>
    </g>
  </g>

  <!-- Claude sparks in -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.4s" dur="0.4s" fill="freeze"/>
    <g>
      <animateMotion begin="7.4s" dur="1.1s" fill="freeze">
        <mpath href="#claudePath"/>
      </animateMotion>
      <circle r="20" fill="#0b1220" stroke="#D97757" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/claude/D97757" x="-10" y="-10" width="20" height="20"/>
    </g>
  </g>

  <!-- ChatGPT sparks in -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.8s" dur="0.4s" fill="freeze"/>
    <g>
      <animateMotion begin="7.8s" dur="1.1s" fill="freeze">
        <mpath href="#gptPath"/>
      </animateMotion>
      <circle r="20" fill="#0b1220" stroke="#74AA9C" stroke-width="2"/>
      <image href="https://cdn.simpleicons.org/openai/74AA9C" x="-10" y="-10" width="20" height="20"/>
    </g>
  </g>

  <!-- steady-state gentle pulse once everything has arrived, looping -->
  <circle cx="450" cy="170" r="6" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" begin="9s" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;10;4" begin="9s" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
