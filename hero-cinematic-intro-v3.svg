<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="45%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <radialGradient id="portGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#93C5FD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="whalePath" d="M -180 220 C 100 190, 270 230, 420 200" fill="none"/>
    <path id="awsPath" d="M 980 50 C 800 62, 700 95, 635 118" fill="none"/>
    <path id="tfPath2" d="M 980 270 C 810 258, 720 216, 655 182" fill="none"/>
    <path id="k8sPath" d="M 450 -80 C 460 12, 500 64, 558 93" fill="none"/>
    <path id="claudePath" d="M 980 320 C 830 302, 760 262, 698 233" fill="none"/>
    <path id="gptPath" d="M -80 320 C 160 302, 350 277, 478 233" fill="none"/>
  </defs>

  <rect width="900" height="380" rx="20" fill="url(#bg)"/>

  <!-- twinkling starfield -->
  <g fill="#ffffff">
    <circle cx="60" cy="40" r="1.3" opacity="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="90" r="1" opacity="0.5"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="60" r="1.4" opacity="0.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="250" r="1.1" opacity="0.5"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="270" r="1.2" opacity="0.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="30" r="1" opacity="0.5"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
  </g>

  <circle cx="450" cy="170" r="140" fill="url(#portGlow)">
    <animate attributeName="r" values="120;155;120" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- whale wake trail: fading ghost copies chasing the real whale -->
  <g opacity="0.35" filter="url(#glow)">
    <animate attributeName="opacity" from="0" to="0.35" begin="0.1s" dur="0.2s" fill="freeze"/>
    <g fill="#2496ED">
      <circle r="3" cy="10">
        <animateMotion begin="0.35s" dur="2.4s" fill="freeze"><mpath href="#whalePath"/></animateMotion>
        <animate attributeName="opacity" values="0.5;0" begin="0.35s" dur="2.2s" fill="freeze"/>
      </circle>
      <circle r="4" cy="10">
        <animateMotion begin="0.5s" dur="2.4s" fill="freeze"><mpath href="#whalePath"/></animateMotion>
        <animate attributeName="opacity" values="0.6;0" begin="0.5s" dur="2.1s" fill="freeze"/>
      </circle>
    </g>
  </g>

  <!-- connecting lines with traveling energy pulses -->
  <g stroke="#93C5FD" stroke-width="1.6" fill="none" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.6s" dur="0.1s" fill="freeze"/>
    <line x1="450" y1="170" x2="600" y2="120" stroke-dasharray="200" stroke-dashoffset="200">
      <animate attributeName="stroke-dashoffset" from="200" to="0" begin="4.6s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="450" y1="170" x2="640" y2="180" stroke-dasharray="220" stroke-dashoffset="220">
      <animate attributeName="stroke-dashoffset" from="220" to="0" begin="5.4s" dur="0.6s" fill="freeze"/>
    </line>
    <line x1="450" y1="170" x2="560" y2="95" stroke-dasharray="180" stroke-dashoffset="180">
      <animate attributeName="stroke-dashoffset" from="180" to="0" begin="6.2s" dur="0.6s" fill="freeze"/>
    </line>
  </g>

  <!-- DOCKER WHALE -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.3s" fill="freeze"/>
    <g filter="url(#bigGlow)">
      <animateMotion begin="0.2s" dur="2.4s" fill="freeze">
        <mpath href="#whalePath"/>
      </animateMotion>
      <path d="M -52,11 C -40,-16 6,-23 34,-14 C 54,-7 65,4 61,13 C 56,22 38,19 27,17
               C 22,27 9,29 2,23 C -20,26 -44,20 -52,11 Z" fill="#2496ED"/>
      <path d="M -52,11 C -63,2 -66,-9 -57,-16 C -59,-4 -57,5 -52,11 Z" fill="#2496ED"/>
      <circle cx="20" cy="4" r="2.2" fill="#0b1220"/>
      <rect x="-7" y="-27" width="11" height="9" fill="#ffffff" opacity="0.95"/>
      <rect x="7" y="-29" width="11" height="11" fill="#93C5FD" opacity="0.95"/>
      <rect x="21" y="-26" width="10" height="8" fill="#ffffff" opacity="0.95"/>
    </g>
  </g>

  <!-- IMPACT FLASH: whale arrives and drops off the name like cargo hitting the dock -->
  <circle cx="440" cy="200" r="4" fill="url(#flash)" opacity="0">
    <animate attributeName="r" values="4;170;4" begin="2.5s" dur="0.7s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.9;0" begin="2.5s" dur="0.7s" fill="freeze"/>
  </circle>
  <!-- shockwave ring -->
  <circle cx="440" cy="200" r="4" fill="none" stroke="#93C5FD" stroke-width="2" opacity="0">
    <animate attributeName="r" values="4;120" begin="2.5s" dur="0.9s" fill="freeze"/>
    <animate attributeName="opacity" values="0.9;0" begin="2.5s" dur="0.9s" fill="freeze"/>
  </circle>

  <!-- name text: bounce/scale entrance -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.65s" dur="0.2s" fill="freeze"/>
    <text x="460" y="150" text-anchor="start" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#93C5FD">&gt; docker run --name</text>
    <g>
      <animateTransform attributeName="transform" type="scale" values="1.6;0.9;1.05;1" begin="2.65s" dur="0.6s" fill="freeze" additive="sum"/>
      <text x="460" y="182" text-anchor="start" font-family="Segoe UI, Verdana, sans-serif" font-size="38" font-weight="800" fill="#ffffff" filter="url(#bigGlow)">Freda Ofori</text>
    </g>
    <text x="460" y="208" text-anchor="start" font-family="Segoe UI, Verdana, sans-serif" font-size="14" letter-spacing="2" fill="#DDD6FE">CLOUD · DEVOPS · INFRASTRUCTURE AUTOMATION</text>
  </g>

  <!-- AWS -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.3s" fill="freeze"/>
    <g filter="url(#glow)">
      <animateMotion begin="3.4s" dur="1.1s" fill="freeze"><mpath href="#awsPath"/></animateMotion>
      <circle r="25" fill="#0b1220" stroke="#FF9900" stroke-width="2.2"/>
      <path d="M -11,3 C -13,-3 -8,-7 -3,-6 C -2,-10 5,-11 8,-6 C 13,-6 14,0 10,3 Z"
            fill="none" stroke="#FF9900" stroke-width="1.8"/>
    </g>
  </g>
  <circle cx="635" cy="118" r="3" fill="none" stroke="#FF9900" stroke-width="1.6" opacity="0">
    <animate attributeName="r" values="3;36" begin="4.5s" dur="0.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0" begin="4.5s" dur="0.5s" fill="freeze"/>
  </circle>

  <!-- Terraform -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.3s" fill="freeze"/>
    <g filter="url(#glow)">
      <animateMotion begin="4.2s" dur="1.1s" fill="freeze"><mpath href="#tfPath2"/></animateMotion>
      <circle r="25" fill="#0b1220" stroke="#844FBA" stroke-width="2.2"/>
      <path d="M -9,-10 L 1,-4 L 1,6 L -9,0 Z" fill="#844FBA"/>
      <path d="M 3,-4 L 13,-10 L 13,0 L 3,6 Z" fill="#844FBA" opacity="0.8"/>
      <path d="M -9,2 L 1,8 L 1,14 L -9,8 Z" fill="#844FBA" opacity="0.55"/>
    </g>
  </g>
  <circle cx="655" cy="182" r="3" fill="none" stroke="#844FBA" stroke-width="1.6" opacity="0">
    <animate attributeName="r" values="3;36" begin="5.3s" dur="0.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0" begin="5.3s" dur="0.5s" fill="freeze"/>
  </circle>

  <!-- Kubernetes -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.3s" fill="freeze"/>
    <g filter="url(#glow)">
      <animateMotion begin="5.0s" dur="1.1s" fill="freeze"><mpath href="#k8sPath"/></animateMotion>
      <circle r="25" fill="#0b1220" stroke="#326CE5" stroke-width="2.2"/>
      <g stroke="#326CE5" stroke-width="1.8">
        <line x1="0" y1="-11" x2="0" y2="11"/>
        <line x1="-9.5" y1="-5.5" x2="9.5" y2="5.5"/>
        <line x1="-9.5" y1="5.5" x2="9.5" y2="-5.5"/>
      </g>
      <circle r="3.8" fill="#326CE5"/>
    </g>
  </g>
  <circle cx="558" cy="93" r="3" fill="none" stroke="#326CE5" stroke-width="1.6" opacity="0">
    <animate attributeName="r" values="3;36" begin="6.1s" dur="0.5s" fill="freeze"/>
    <animate attributeName="opacity" values="0.8;0" begin="6.1s" dur="0.5s" fill="freeze"/>
  </circle>

  <!-- Claude -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.4s" dur="0.4s" fill="freeze"/>
    <g filter="url(#glow)">
      <animateMotion begin="7.4s" dur="1.1s" fill="freeze"><mpath href="#claudePath"/></animateMotion>
      <circle r="21" fill="#0b1220" stroke="#D97757" stroke-width="2.2"/>
      <g stroke="#D97757" stroke-width="2.2" stroke-linecap="round">
        <line x1="0" y1="-8" x2="0" y2="8"/>
        <line x1="-7" y1="-4" x2="7" y2="4"/>
        <line x1="-7" y1="4" x2="7" y2="-4"/>
      </g>
    </g>
  </g>

  <!-- ChatGPT -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="7.8s" dur="0.4s" fill="freeze"/>
    <g filter="url(#glow)">
      <animateMotion begin="7.8s" dur="1.1s" fill="freeze"><mpath href="#gptPath"/></animateMotion>
      <circle r="21" fill="#0b1220" stroke="#74AA9C" stroke-width="2.2"/>
      <circle cx="-4" cy="-3" r="4.8" fill="none" stroke="#74AA9C" stroke-width="1.8"/>
      <circle cx="5" cy="-3" r="4.8" fill="none" stroke="#74AA9C" stroke-width="1.8"/>
      <circle cx="0" cy="5" r="4.8" fill="none" stroke="#74AA9C" stroke-width="1.8"/>
    </g>
  </g>

  <!-- SUPERNOVA FINALE: everything has connected, the whole thing detonates into light then settles -->
  <circle cx="450" cy="170" r="2" fill="url(#flash)" opacity="0">
    <animate attributeName="r" values="2;260;2" begin="8.6s" dur="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="0;1;0" begin="8.6s" dur="1.1s" fill="freeze"/>
  </circle>
  <circle cx="450" cy="170" r="2" fill="none" stroke="#C4B5FD" stroke-width="2" opacity="0">
    <animate attributeName="r" values="2;220" begin="8.7s" dur="1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" begin="8.7s" dur="1s" fill="freeze"/>
  </circle>

  <!-- CLOSING ACT: invitation to explore and collaborate -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="9.4s" dur="0.8s" fill="freeze"/>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,14;0,0" begin="9.4s" dur="0.8s" fill="freeze" additive="sum"/>
      <line x1="360" y1="300" x2="540" y2="300" stroke="#7C3AED" stroke-width="1" opacity="0.6"/>
      <text x="450" y="325" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="17" font-weight="700" fill="#ffffff" filter="url(#glow)">Explore my repositories below ↓</text>
      <text x="450" y="352" text-anchor="middle" font-family="Segoe UI, Verdana, sans-serif" font-size="13.5" letter-spacing="1" fill="#C4B5FD">Always open for collaborations &#38; new ideas</text>
    </g>
  </g>

  <!-- ambient heartbeat pulse once settled, loops forever -->
  <circle cx="450" cy="170" r="6" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.95;0" begin="10s" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;12;4" begin="10s" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>
